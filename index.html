<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="theme-color" content="#07070f"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Color Takeover"/>
  <meta name="description" content="Jeu de conquête de territoire par les couleurs. Affrontez le bot et dominez la grille !"/>

  <title>Color Takeover</title>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="icon" href="/icons/icon-192.png"/>
  <link rel="apple-touch-icon" href="/icons/icon-192.png"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #07070f;
      overflow: hidden;
      font-family: monospace;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      touch-action: manipulation;
    }
    #root {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }
    /* Safe area for notch phones */
    #root {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Game -->
  <script type="text/babel" data-type="module" src="/color-takeover.jsx"></script>

  <script>
    // Mount React app
    window.addEventListener('load', function() {
      // Small delay to let Babel compile
      setTimeout(function() {
        if (window.App) {
          const root = ReactDOM.createRoot(document.getElementById('root'));
          root.render(React.createElement(window.App));
        }
      }, 100);

      // Register service worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').then(function(reg) {
          console.log('SW registered');
        }).catch(function(e) {
          console.log('SW failed:', e);
        });
      }
    });

    // Prevent zoom on double tap (Android)
    let lastTap = 0;
    document.addEventListener('touchend', function(e) {
      const now = Date.now();
      if (now - lastTap < 300) e.preventDefault();
      lastTap = now;
    }, { passive: false });

    // Prevent pull-to-refresh
    document.addEventListener('touchmove', function(e) {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });
  </script>
</body>
</html>
